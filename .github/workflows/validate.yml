name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Compile Python
        run: python -m compileall custom_components tests
      - name: Run tests
        run: python -m pytest tests
      - name: Validate JSON
        run: python -m json.tool custom_components/uniview_cloud/manifest.json > /dev/null && python -m json.tool hacs.json > /dev/null && python -m json.tool custom_components/uniview_cloud/translations/en.json > /dev/null
